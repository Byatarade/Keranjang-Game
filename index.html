<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keranjang</title>
  </head>
  <body>
    <header>
      <p>Keranjang Apel</p>
    </header>
    <main>
      <div class="game-wrap">
      <canvas id="gameCanvas"></canvas>
      <div id="gameStartDiv" class="gameUI">
        <h1>Keranjang Apel</h1>
        <p>Kamu Hanya diberi waktu 30 detik untuk mengumpulkan apel!</p>
        <button id="gameStartBtn"><p>Mulai Game</p></button>
      </div>
      <div id="gameEndDiv" class="gameUI">
        <p>Game Over</p>
        <h1>You <span id="gameWinLoseSpan"></span></h1>
        <h1>Final Score: <span id="gameEndScoreSpan"></span></h1>
        <p>Refresh the page to play again.</p>
      </div>
      </div>
      <div id="touchControls" class="touch-controls" aria-label="Kontrol gerak">
        <button type="button" id="touchBtnLeft" class="touch-btn" aria-label="Kiri">◀</button>
        <button type="button" id="touchBtnRight" class="touch-btn" aria-label="Kanan">▶</button>
      </div>
    </main>
    <footer>
      <p>@Byatara</p>
    </footer>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
